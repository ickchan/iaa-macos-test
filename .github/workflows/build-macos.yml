name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]

    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10 (arm64, native)
        if: matrix.arch == 'arm64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Python 3.10 (x86_64 via python-build-standalone)
        if: matrix.arch == 'x86_64'
        run: |
          curl -fsSL \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20241016/cpython-3.10.15+20241016-x86_64-apple-darwin-install_only_stripped.tar.gz" \
            | tar xz -C "$HOME"
          echo "$HOME/python/bin" >> "$GITHUB_PATH"

      - name: Install uv
        run: python3 -m pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Print environment info
        run: |
          echo "=== Python arch ==="
          python3 -c "import platform; print(platform.machine())"
          echo "=== Python deployment target ==="
          python3 -c "import sysconfig; print(sysconfig.get_config_var('MACOSX_DEPLOYMENT_TARGET'))"
          echo "=== PySide6 version ==="
          uv run python3 -c "import PySide6; print(PySide6.__version__)"

      - name: Generate template resources (R.py)
        run: uv run ./tools/make_resources.py

      - name: Build release bundle
        run: uv run build.py build

      - name: Print binary minimum macOS version
        run: |
          EXE="build/iaa/iaa"
          echo "=== LC_BUILD_VERSION (minimum macOS) for ${EXE} ==="
          otool -l "${EXE}" | grep -A4 'LC_BUILD_VERSION' || true
          otool -l "${EXE}" | grep -A3 'LC_VERSION_MIN_MACOSX' || true

      - name: Locate and rename artifact
        id: asset
        run: |
          ASSET=$(ls dist_app/iaa_v*.dmg | head -1)
          BASE=$(basename "${ASSET}" .dmg)
          RENAMED="dist_app/${BASE}_${{ matrix.arch }}.dmg"
          mv "${ASSET}" "${RENAMED}"
          echo "asset_path=${RENAMED}" >> $GITHUB_OUTPUT
          echo "asset_name=$(basename ${RENAMED})" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset.outputs.asset_name }}
          path: ${{ steps.asset.outputs.asset_path }}
